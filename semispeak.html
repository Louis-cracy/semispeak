<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SemiSpeak">
<meta name="theme-color" content="#080C10">
<title>SemiSpeak</title>
<style>
  :root {
    --green: #00FFB2;
    --orange: #FF6B35;
    --purple: #7B61FF;
    --yellow: #FFD700;
    --red: #FF3B30;
    --bg: #080C10;
    --card: #0D1117;
    --border: #1a1a1a;
    --text: #E0E0E0;
    --muted: #555;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }

  /* Scrollable pages */
  .page { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 16px calc(80px + var(--safe-bottom)); padding-top: calc(16px + var(--safe-top)); max-width: 480px; margin: 0 auto; display: none; }
  .page.active { display: block; }

  /* Bottom Nav */
  #bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,12,16,0.95); border-top: 1px solid #1a1a1a; display: flex; padding-bottom: var(--safe-bottom); backdrop-filter: blur(12px); z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: monospace; transition: color 0.2s; gap: 3px; }
  .nav-item.active { color: var(--green); }
  .nav-item .nav-icon { font-size: 18px; }
  .nav-item .nav-label { font-size: 9px; letter-spacing: 1px; }

  /* BG grid */
  #bg { position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(0,255,178,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,178,0.03) 1px, transparent 1px);
    background-size: 40px 40px; }

  /* Typography */
  .page-title { font-size: 11px; letter-spacing: 4px; color: var(--muted); margin-bottom: 6px; }
  .section-label { font-size: 9px; letter-spacing: 3px; color: #444; margin-bottom: 10px; text-transform: uppercase; }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Buttons */
  .btn { display: block; width: 100%; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; border: 1px solid; text-align: center; }
  .btn-primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 900; }
  .btn-outline { background: transparent; }
  .btn-sm { padding: 6px 14px; border-radius: 20px; font-size: 11px; width: auto; display: inline-block; }

  /* Flash card */
  .flashcard { border: 1px solid; border-radius: 12px; padding: 24px 20px; min-height: 150px; position: relative; background: var(--card); cursor: pointer; margin-bottom: 14px; }
  .domain-tag { position: absolute; top: 10px; right: 10px; font-size: 9px; padding: 3px 8px; border-radius: 20px; letter-spacing: 2px; font-weight: 700; }
  .word-main { font-size: 32px; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 4px; line-height: 1.1; }
  .word-pron { color: #444; font-size: 13px; margin-bottom: 8px; }
  .word-def { color: var(--green); font-size: 15px; font-weight: 700; margin-top: 6px; }
  .flip-hint { font-size: 11px; color: #333; margin-top: 10px; }

  /* Example box */
  .example-box { border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; background: #0a0e13; }
  .example-text { font-size: 13px; color: #888; line-height: 1.7; font-style: italic; }

  /* Grade buttons */
  .grade-row { display: flex; gap: 8px; margin-top: 16px; }
  .grade-btn { flex: 1; padding: 10px 4px; border-radius: 8px; background: transparent; font-family: monospace; cursor: pointer; transition: all 0.15s; border: 1px solid; }
  .grade-btn .grade-label { font-size: 12px; font-weight: 700; }
  .grade-btn .grade-sub { font-size: 9px; opacity: 0.7; margin-top: 2px; }

  /* Speak button */
  .speak-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; border: 1px solid; background: transparent; font-family: monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; }
  .speak-btn.playing { color: #000 !important; }

  /* Filter pills */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-pill { padding: 4px 12px; border-radius: 20px; border: 1px solid #333; background: none; color: #666; font-size: 11px; cursor: pointer; font-family: monospace; letter-spacing: 1px; transition: all 0.2s; }
  .filter-pill.active { background: var(--green); color: #000; border-color: var(--green); }

  /* Progress bar */
  .prog-bar { height: 3px; background: #111; border-radius: 2px; margin-bottom: 18px; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* Stats mini */
  .stat-mini { text-align: center; }
  .stat-mini .val { font-size: 26px; font-weight: 900; }
  .stat-mini .lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-top: 2px; }

  /* Generation banner */
  .gen-banner { background: #0a1a12; border: 1px solid var(--green); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--green); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
  .gen-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Translation */
  .trans-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; font-family: monospace; resize: none; line-height: 1.6; outline: none; }
  .trans-input:focus { border-color: var(--green); }
  .trans-result { background: #0a0e13; border: 1px solid var(--border); border-radius: 8px; padding: 14px; min-height: 80px; }
  .trans-result .translation { font-size: 16px; color: #fff; font-weight: 700; margin-bottom: 8px; }
  .trans-result .pron { font-size: 13px; color: #444; margin-bottom: 6px; }
  .trans-result .note { font-size: 12px; color: #666; line-height: 1.6; }

  /* Direction toggle */
  .dir-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 14px; }
  .dir-btn { flex: 1; padding: 8px; border: none; background: none; color: var(--muted); font-family: monospace; font-size: 12px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .dir-btn.active { background: var(--green); color: #000; font-weight: 700; }

  /* Library list */
  .lib-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; margin-bottom: 8px; }
  .lib-item-header { display: flex; align-items: center; gap: 10px; }
  .lib-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .lib-word { color: #fff; font-weight: 700; font-size: 14px; }
  .lib-pron { color: #444; font-size: 11px; margin-left: 6px; }
  .lib-cat { color: #333; font-size: 10px; margin-left: auto; }
  .lib-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: none; }
  .lib-item.open .lib-detail { display: block; }

  /* Scenario card */
  .scenario-card { border: 1px solid; border-radius: 12px; padding: 18px; margin-bottom: 14px; background: var(--card); position: relative; white-space: pre-line; }
  .scenario-setup { font-size: 14px; color: #ccc; line-height: 1.7; margin-top: 8px; }

  /* Tabs */
  .tab-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 8px; border: 1px solid #333; border-radius: 6px; background: none; color: var(--muted); font-size: 11px; cursor: pointer; font-family: monospace; letter-spacing: 1px; transition: all 0.2s; }
  .tab-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
  .tab-content { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 14px; min-height: 130px; }

  /* Nav rows */
  .nav-row { display: flex; gap: 10px; margin-top: 16px; }
  .nav-row .btn { flex: 1; }

  /* Search */
  .search-input { width: 100%; background: var(--card); border: 1px solid var(--border); color: #fff; padding: 9px 12px; border-radius: 6px; font-size: 13px; font-family: monospace; margin-bottom: 12px; outline: none; }
  .search-input:focus { border-color: var(--purple); }

  /* Home grid */
  .home-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .home-card { background: var(--card); border: 1px solid; border-radius: 10px; padding: 14px; cursor: pointer; text-align: left; transition: all 0.15s; }
  .home-card:active { opacity: 0.8; transform: scale(0.98); }
  .home-card-icon { font-size: 22px; margin-bottom: 6px; }
  .home-card-label { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .home-card-sub { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .home-card-desc { font-size: 10px; color: #444; margin-bottom: 10px; }

  /* Accent selector */
  .accent-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .accent-label { font-size: 10px; letter-spacing: 2px; color: #444; }

  /* Scrollable sub-pages (within listening/speaking) */
  .sub-back { background: none; border: none; color: var(--green); font-family: monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; padding: 0; margin-bottom: 18px; display: block; }

  /* QA inputs */
  .qa-input { width: 100%; background: #080C10; border: 1px solid #222; color: #fff; padding: 8px 10px; border-radius: 4px; font-size: 12px; font-family: monospace; resize: vertical; min-height: 50px; }

  /* Completion */
  .done-screen { text-align: center; padding-top: 60px; }
  .done-icon { font-size: 56px; margin-bottom: 14px; }
  .done-title { color: var(--green); font-size: 20px; font-weight: 900; margin-bottom: 8px; }
  .done-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }

  /* bar chart */
  .bar-chart { display: flex; gap: 6px; align-items: flex-end; height: 70px; margin-bottom: 18px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
  .bar-val { font-size: 9px; color: var(--yellow); }
  .bar-fill { width: 100%; border-radius: 3px; }
  .bar-lbl { font-size: 8px; color: #444; }

  /* Phrase chip */
  .phrase-chip { display: inline-flex; align-items: center; gap: 4px; border: 1px solid var(--purple); color: var(--purple); font-size: 11px; padding: 4px 10px; border-radius: 20px; margin: 0 6px 8px 0; }

  /* Tip text */
  .tip-item { font-size: 12px; color: #ccc; line-height: 1.7; margin-bottom: 8px; }

  /* badge */
  .badge { font-size: 9px; padding: 3px 8px; border-radius: 20px; letter-spacing: 2px; font-weight: 700; }

  /* Separator */
  .sep { height: 1px; background: var(--border); margin: 14px 0; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="bg"></div>

<!-- Pages -->
<div class="page active" id="p-home"></div>
<div class="page" id="p-vocab"></div>
<div class="page" id="p-idioms"></div>
<div class="page" id="p-speaking"></div>
<div class="page" id="p-listening"></div>
<div class="page" id="p-translate"></div>

<!-- Bottom Nav -->
<nav id="bottom-nav">
  <button class="nav-item active" data-page="home" onclick="showPage('home')">
    <span class="nav-icon">⌂</span><span class="nav-label">HOME</span>
  </button>
  <button class="nav-item" data-page="vocab" onclick="showPage('vocab')">
    <span class="nav-icon">◈</span><span class="nav-label">VOCAB</span>
  </button>
  <button class="nav-item" data-page="idioms" onclick="showPage('idioms')">
    <span class="nav-icon">◉</span><span class="nav-label">IDIOMS</span>
  </button>
  <button class="nav-item" data-page="speaking" onclick="showPage('speaking')">
    <span class="nav-icon">◎</span><span class="nav-label">SPEAK</span>
  </button>
  <button class="nav-item" data-page="listening" onclick="showPage('listening')">
    <span class="nav-icon">◇</span><span class="nav-label">LISTEN</span>
  </button>
  <button class="nav-item" data-page="translate" onclick="showPage('translate')">
    <span class="nav-icon">⇄</span><span class="nav-label">TRANS</span>
  </button>
</nav>

<script>
// ═══════════════════════════════════════════════════════════
// STORAGE & STATE
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'semispeak_v4';
const SRS_INTERVALS = [1, 3, 7, 14, 30, 90];
const NEW_PER_DAY = 5;

const SEED_VOCAB = [
  { word: "candid", pronunciation: "/ˈkændɪd/", def: "率直な", example: "Let me be candid — I think we need to revisit the timeline.", category: "会議" },
  { word: "pragmatic", pronunciation: "/præɡˈmætɪk/", def: "現実的な", example: "Let's be pragmatic — a 6-month timeline isn't realistic.", category: "議論" },
  { word: "nuance", pronunciation: "/ˈnjuːɑːns/", def: "細かい違い", example: "There's a nuance here we shouldn't overlook.", category: "議論" },
  { word: "feasible", pronunciation: "/ˈfiːzəbl/", def: "実現可能な", example: "Is a Q2 launch feasible given current resources?", category: "会議" },
  { word: "caveat", pronunciation: "/ˈkæviæt/", def: "但し書き", example: "I'll agree, with the caveat that we revisit in 30 days.", category: "交渉" },
  { word: "resonate", pronunciation: "/ˈrezəneɪt/", def: "共感を呼ぶ", example: "That value proposition really resonates with us.", category: "営業" },
  { word: "robust", pronunciation: "/roʊˈbʌst/", def: "堅牢な", example: "We need a more robust testing strategy.", category: "技術" },
  { word: "actionable", pronunciation: "/ˈækʃənəbl/", def: "具体的な", example: "Let's make sure the feedback is actionable.", category: "会議" },
  { word: "granular", pronunciation: "/ˈɡrænjələr/", def: "詳細な", example: "Can we get more granular data on the failure modes?", category: "技術" },
  { word: "calibrate", pronunciation: "/ˈkælɪbreɪt/", def: "認識を合わせる", example: "Let's calibrate our expectations before we start.", category: "会議" },
  { word: "leverage", pronunciation: "/ˈlevərɪdʒ/", def: "活用する", example: "We should leverage our existing relationships.", category: "戦略" },
  { word: "bottleneck", pronunciation: "/ˈbɑːtlnek/", def: "制約・詰まり", example: "The approval process is the main bottleneck right now.", category: "議論" },
  { word: "compelling", pronunciation: "/kəmˈpelɪŋ/", def: "説得力のある", example: "That's a compelling case for moving forward.", category: "営業" },
  { word: "proactive", pronunciation: "/proʊˈæktɪv/", def: "先手を打つ", example: "Let's be proactive and flag this before it becomes an issue.", category: "仕事全般" },
  { word: "iterate", pronunciation: "/ˈɪtəreɪt/", def: "繰り返し改善する", example: "Let's iterate quickly and gather feedback.", category: "開発" },
];

const IDIOMS_DATA = [
  { phrase: "move the needle", meaning: "数値や状況を大きく動かす", example: "This feature really moves the needle on retention.", context: "会議・プレゼン" },
  { phrase: "low-hanging fruit", meaning: "簡単に取れる成果・すぐできること", example: "Fixing the login flow is the low-hanging fruit here.", context: "議論" },
  { phrase: "bandwidth", meaning: "（比喩）余力・リソース・空き時間", example: "I don't have the bandwidth to take that on this sprint.", context: "日常" },
  { phrase: "boil the ocean", meaning: "非現実的に大きすぎることをしようとする", example: "Let's not boil the ocean — pick the top three priorities.", context: "議論" },
  { phrase: "circle back", meaning: "後で再度話し合う・後で連絡する", example: "Let me circle back with legal and get you an answer.", context: "会議" },
  { phrase: "in the weeds", meaning: "細かい詳細に深く入り込んでいる", example: "We got in the weeds — let's zoom out to the big picture.", context: "会議" },
  { phrase: "table this", meaning: "（米式）この話題を後回しにする", example: "Can we table this for now and come back next week?", context: "会議" },
  { phrase: "take this offline", meaning: "この議論は会議後に別途話し合う", example: "That's a good question — let's take it offline after this call.", context: "会議" },
  { phrase: "touch base", meaning: "軽く連絡を取る・状況確認する", example: "Can we touch base on Friday before the review?", context: "日常" },
  { phrase: "on the same page", meaning: "認識が一致している", example: "I just want to make sure we're all on the same page.", context: "会議" },
  { phrase: "ballpark figure", meaning: "大まかな概算", example: "Just give me a ballpark figure — doesn't need to be exact.", context: "見積・交渉" },
  { phrase: "read the room", meaning: "場の空気を読む", example: "He didn't read the room — it wasn't the time to bring up cost.", context: "雑談・対人" },
  { phrase: "hit the ground running", meaning: "すぐに全力で取り組む", example: "We need someone who can hit the ground running on day one.", context: "採用・プロジェクト" },
  { phrase: "devil's in the details", meaning: "細部が重要・詳細を詰めないと問題が出る", example: "The concept looks great, but the devil's in the details.", context: "技術・議論" },
  { phrase: "push the envelope", meaning: "限界に挑戦する", example: "This design really pushes the envelope on power density.", context: "技術・プレゼン" },
];

const SPEAKING_SCENARIOS = [
  {
    title: "Design Win Pitch",
    color: "#7B61FF",
    setup: `You're presenting your SerDes IP to a Meta AI infra team.\nThey ask: "Why should we choose you over Synopsys?"`,
    keyPhrases: ["silicon-proven", "moves the needle", "our roadmap aligns with", "I'll be candid"],
    tips: ["具体的な数値を出す (e.g., 25% better power)", "競合を直接攻撃せず自社の強みで語る", "\"We've validated interoperability with...\" で実績を示す"],
    modelAnswer: "Great question, and I'll be candid — this is a competitive space. Our IP is silicon-proven on TSMC N3, which moves the needle on de-risking your schedule. From a PPA standpoint, we're seeing 25% better power efficiency at 112G. We've also validated interoperability with the top three switch vendors, so integration friction is minimal. Our roadmap aligns with your 224G timeline — tape-out is targeted for Q2 next year."
  },
  {
    title: "Handling Pushback",
    color: "#FF6B35",
    setup: `An NVIDIA engineer says:\n"Your jitter spec of 10ps RMS seems too optimistic. We've seen 15ps in silicon."`,
    keyPhrases: ["fair point", "let me walk you through", "I'll defer to the data", "caveat"],
    tips: ["まず相手の懸念を認める", "データで丁寧に反論する", "不確かな点は正直に認める"],
    modelAnswer: "That's a fair point, and I appreciate you flagging it. Let me walk you through our characterization data. The 10ps is at the typical corner — at worst-case, we're seeing 13 to 14ps, which I'll admit is closer to what you've observed. The equalization handles it well, and I'll defer to the data: the eye at those corners still shows comfortable margin. One caveat — I'd want to align on test conditions before we compare numbers directly. Can I share our full characterization deck?"
  },
  {
    title: "Small Talk — Conference",
    color: "#00FFB2",
    setup: `You're at Hot Chips. Someone from Broadcom's marketing introduces themselves.\n"So what brings you here this year?"`,
    keyPhrases: ["excited about", "it resonates with us", "have you seen", "I'd love to connect"],
    tips: ["技術の話を一言で説明できるようにしておく", "相手への関心を示す質問を返す", "自社のユニークな点を一言で"],
    modelAnswer: "Honestly, I'm most excited about the AI inference workload sessions — the shift in memory bandwidth requirements directly resonates with us as an IP vendor. We're seeing customers rethink their interconnect architecture entirely. Have you seen any interesting talks so far? I'd love to compare notes. And I'd love to connect later — we've got some work in a space that might be adjacent to what Broadcom is doing on the networking side."
  },
  {
    title: "Budget Negotiation",
    color: "#FFD700",
    setup: `Procurement says:\n"Your NRE is $2M — that's twice our budget. We need to cut this significantly."`,
    keyPhrases: ["I want to make this work", "scope the work differently", "mutual investment", "pragmatic"],
    tips: ["即値引きしない — まずスコープを話し合う", "長期の取引として枠組みを変える", "相手の制約を理解していることを示す"],
    modelAnswer: "I hear you, and I want to make this work. Let's be pragmatic about it. Before we talk numbers, help me understand the priorities — are there must-haves versus nice-to-haves in the spec? If we scope the work differently, we may be able to phase the NRE across two fiscal years. Alternatively, if you're committing to volume on the back end, we'd view this as a mutual investment and have more flexibility on the upfront cost. What does your volume outlook look like over the next two or three years?"
  },
];

const LISTENING_EXERCISES = [
  {
    title: "Board Meeting Excerpt",
    script: "So looking at Q3, our design win momentum has been strong. We closed three strategic accounts — two hyperscalers and one OEM — which really moves the needle on our 2025 revenue outlook. That said, we're getting pushback from customers on lead time. The supply chain team is in the weeds on this, and we expect to have a resolution by end of month. I want to be transparent: the situation is improving, but we're not out of the woods yet. On the roadmap side, our 224G program is on track. We've mitigated the key risks and the PPA numbers are looking compelling.",
    questions: [
      { q: "How many design wins were closed in Q3?", a: "3 (two hyperscalers, one OEM)" },
      { q: "What issue are customers pushing back on?", a: "Lead time" },
      { q: "What phrase means 'not yet resolved'?", a: "\"Not out of the woods yet\"" },
    ],
    vocab: ["design win momentum", "moves the needle", "pushback", "transparent", "compelling"]
  },
  {

function todayStr() { return new Date().toISOString().slice(0, 10); }
function addDays(d, n) { const dt = new Date(d); dt.setDate(dt.getDate() + n); return dt.toISOString().slice(0, 10); }

function loadAppState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch {}
  const today = todayStr();
  return {
    library: SEED_VOCAB.map((v, i) => ({
      ...v, id: `seed_${i}`, addedDate: today, nextReview: today,
      interval: 0, easeFactor: 2.5, reviewCount: 0, known: false,
    })),
    lastGeneratedDate: null,
    reviewsDoneToday: 0,
    idiomIdx: 0,
    speakingIdx: 0,
    listeningIdx: 0,
  };
}
function saveAppState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(APP)); } catch {} }

let APP = loadAppState();

function getDueCards() {
  const today = todayStr();
  return APP.library.filter(c => c.reviewCount > 0 && c.nextReview <= today);
}
function getNewCards() {
  const today = todayStr();
  return APP.library.filter(c => c.addedDate === today && c.reviewCount === 0).slice(0, NEW_PER_DAY);
}
function buildQueue() {
  const nc = getNewCards(), dc = getDueCards();
  const seen = new Set();
  return [...nc, ...dc].filter(c => { if (seen.has(c.id)) return false; seen.add(c.id); return true; });
}
function gradeCard(card, grade) {
  let { interval, easeFactor, reviewCount } = card;
  if (grade === 0) interval = 0;
  else { interval = Math.max(0, Math.min(SRS_INTERVALS.length - 1, interval + grade - 1)); easeFactor = Math.max(1.3, easeFactor + (0.1 - (3 - grade) * 0.08)); }
  APP.library = APP.library.map(c => c.id !== card.id ? c : { ...card, interval, easeFactor, reviewCount: reviewCount + 1, nextReview: addDays(todayStr(), SRS_INTERVALS[interval]), known: grade >= 2 });
  APP.reviewsDoneToday = (APP.reviewsDoneToday || 0) + 1;
  saveAppState();
}

let currentAccent = 'american';
function speakText(text, accent, rate) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const go = () => {
    const utt = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    let voice;
    if ((accent || currentAccent) === 'indian') {
      voice = voices.find(v => /ravi|neerja|en-in|hi-in|indian/i.test(v.name + v.lang))
        || voices.find(v => v.lang === 'en-IN')
        || voices.find(v => v.lang.startsWith('en'));
      utt.lang = 'en-IN'; utt.pitch = 1.1;
    } else {
      voice = voices.find(v => /samantha|alex|google us/i.test(v.name) && v.lang === 'en-US')
        || voices.find(v => v.lang === 'en-US')
        || voices.find(v => v.lang.startsWith('en'));
      utt.lang = 'en-US'; utt.pitch = 1.0;
    }
    if (voice) utt.voice = voice;
    utt.rate = rate || 0.88;
    window.speechSynthesis.speak(utt);
  };
  if (window.speechSynthesis.getVoices().length === 0) {
    window.speechSynthesis.onvoiceschanged = () => { go(); window.speechSynthesis.onvoiceschanged = null; };
  } else go();
}
function makeSpeakBtn(text, label, color, accent, rate) {
  const btn = document.createElement('button');
  btn.className = 'speak-btn';
  btn.style.borderColor = color || 'var(--green)';
  btn.style.color = color || 'var(--green)';
  btn.innerHTML = `▶ ${label || ''}`;
  btn.onclick = (e) => {
    e.stopPropagation();
    if (btn.classList.contains('playing')) { window.speechSynthesis.cancel(); btn.classList.remove('playing'); btn.innerHTML = `▶ ${label||''}`; btn.style.background='transparent'; btn.style.color=color||'var(--green)'; return; }
    btn.classList.add('playing'); btn.innerHTML = `⏹ ${label||''}`; btn.style.background=color||'var(--green)'; btn.style.color='#000';
    speakText(text, accent, rate);
    setTimeout(() => { btn.classList.remove('playing'); btn.innerHTML=`▶ ${label||''}`; btn.style.background='transparent'; btn.style.color=color||'var(--green)'; }, Math.max(2000, text.length * 70));
  };
  return btn;
}

function renderVocab() {
  const el = document.getElementById('p-vocab');
  // Auto-generate if needed
  maybeGenerateVocab().then(() => renderVocabContent(el));
  renderVocabContent(el);
}

async function maybeGenerateVocab() {
  const today = todayStr();
  if (APP.lastGeneratedDate === today || APP.generating) return;
  APP.generating = true;
  renderHome();
  try {
    const existing = APP.library.map(c => c.word);
    const newWords = await generateVocabAI(existing, NEW_PER_DAY);
    const newCards = newWords.map((v, i) => ({
      ...v, id: `ai_${today}_${i}`, addedDate: today, nextReview: today,
      interval: 0, easeFactor: 2.5, reviewCount: 0, known: false,
    }));
    APP.library = [...APP.library, ...newCards];
    APP.lastGeneratedDate = today;
  } catch(e) { /* use seeds */ }
  APP.generating = false;
  saveAppState();
  renderHome();
}

async function generateVocabAI(existing, count) {
  const avoid = existing.slice(0, 50).join(', ');
  const prompt = `Generate exactly ${count} useful English words for a Japanese professional in global semiconductor business (meetings, negotiations, small talk with Silicon Valley engineers). Focus on general business/professional English — NOT technical semiconductor terms. Avoid these words: ${avoid}. Return ONLY a JSON array, no markdown:\n[{"word":"","pronunciation":"IPA like /wɜːrd/","def":"Japanese 8 chars max","example":"natural business sentence 15-25 words","category":"one of:会議|議論|交渉|営業|戦略|技術|日常|雑談|メール"}]`;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
  });
  const data = await res.json();
  const text = (data.content || []).map(b => b.text || '').join('').replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

function renderVocabContent(el) {
  if (vocabState.subView === 'library') { renderVocabLibrary(el); return; }

}

let transDir = 'ja-en'; // ja-en | en-ja
let transLoading = false;
function renderTranslate() {
  const el = document.getElementById('p-translate');
  el.innerHTML = `
    <div style="color:#00b3ff;font-size:14px;letter-spacing:3px;font-weight:700;margin-bottom:16px;">⇄ TRANSLATION</div>

    <div class="dir-toggle">
      <button class="dir-btn ${transDir==='ja-en'?'active':''}" onclick="setTransDir('ja-en')">🇯🇵 日本語 → 🇺🇸 英語</button>
      <button class="dir-btn ${transDir==='en-ja'?'active':''}" onclick="setTransDir('en-ja')">🇺🇸 英語 → 🇯🇵 日本語</button>
    </div>

    <div class="section-label">${transDir==='ja-en'?'日本語を入力':'English input'}</div>
    <textarea class="trans-input" id="trans-input" rows="4" placeholder="${transDir==='ja-en'?'例: この件については後で改めて話し合いましょう':'e.g. Let me circle back on this later.'}" style="margin-bottom:10px;"></textarea>

    <button class="btn btn-primary" style="margin-bottom:16px;background:#00b3ff;border-color:#00b3ff;" onclick="doTranslate()" id="trans-btn">⇄ 翻訳する</button>

    <div id="trans-result" style="display:none;">
      <div class="section-label">翻訳結果</div>
      <div class="trans-result" id="trans-output"></div>
    </div>

    <div class="sep"></div>
    <div class="section-label">クイック翻訳例</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${[
        ['ちょっと確認させてください', 'Let me just double-check on that.'],
        ['後で改めて連絡します', "I'll circle back with you on that."],
        ['持ち帰って検討します', 'Let me take this back to my team.'],
        ['認識は合っていますか？', 'Are we on the same page?'],
      ].map(([jp, en]) => `
      <div class="card" style="padding:10px 12px;cursor:pointer;" onclick="quickTrans('${jp}','${en}')">
        <div style="font-size:12px;color:#888;margin-bottom:3px;">${jp}</div>
        <div style="font-size:13px;color:#fff;font-weight:700;">${en}</div>
      </div>`).join('')}
    </div>
  `;
}
function setTransDir(dir) { transDir = dir; renderTranslate(); }
async function doTranslate() {
  const input = document.getElementById('trans-input')?.value?.trim();
  if (!input || transLoading) return;
  transLoading = true;
  const btn = document.getElementById('trans-btn');
  if (btn) btn.innerHTML = '<span class="spinner"></span> 翻訳中...';

  const isJaEn = transDir === 'ja-en';
  const prompt = isJaEn
    ? `Translate this Japanese business phrase to natural American English for a semiconductor industry professional. Return ONLY JSON: {"translation":"English translation","pronunciation":"IPA for key words like /wɜːrd/","note":"Brief Japanese explanation of nuance or usage tip (2 sentences max)","alternatives":["alt1","alt2"]}\n\nInput: ${input}`
    : `Translate this English business phrase to natural Japanese for a semiconductor industry professional. Return ONLY JSON: {"translation":"日本語訳","pronunciation":"カタカナ読み or IPA","note":"使い方・ニュアンスの説明 (2文以内)","alternatives":["代替表現1","代替表現2"]}\n\nInput: ${input}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 600, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const result = JSON.parse(text);
    showTransResult(result, input, isJaEn);
  } catch(e) {
    const out = document.getElementById('trans-output');
    if (out) out.innerHTML = `<div style="color:var(--red);">翻訳に失敗しました。もう一度お試しください。</div>`;
    document.getElementById('trans-result').style.display = 'block';
  }
  transLoading = false;
  if (btn) btn.innerHTML = '⇄ 翻訳する';
}
function showTransResult(r, input, isJaEn) {
  const out = document.getElementById('trans-output');
  const res = document.getElementById('trans-result');
  if (!out || !res) return;
  res.style.display = 'block';
  out.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;">
      <div class="translation">${r.translation}</div>
      <button class="speak-btn" style="border-color:#00b3ff;color:#00b3ff;flex-shrink:0;margin-left:10px;" onclick="speakText('${(r.translation||'').replace(/'/g,"\\'")}')">▶ 発音</button>
    </div>
    ${r.pronunciation ? `<div class="pron">${r.pronunciation}</div>` : ''}
    ${r.note ? `<div class="note" style="margin-bottom:8px;">${r.note}</div>` : ''}
    ${r.alternatives?.length ? `<div class="section-label" style="margin-top:10px;">別の言い方</div>${r.alternatives.map(a=>`<div style="font-size:12px;color:#888;margin-bottom:4px;display:flex;align-items:center;gap:8px;">・${a} <button class="speak-btn" style="border-color:#00b3ff;color:#00b3ff;padding:2px 8px;font-size:10px;" onclick="speakText('${a.replace(/'/g,"\\'")}')">▶</button></div>`).join('')}` : ''}
  `;
}
function quickTrans(jp, en) {
  const el = document.getElementById('trans-input');
  if (el) { el.value = jp; }
  const r = { translation: en, pronunciation: '', note: 'ビジネス英語でよく使われる表現です。', alternatives: [] };
  const res = document.getElementById('trans-result');
  if (res) res.style.display = 'block';
  showTransResult(r, jp, true);
}
